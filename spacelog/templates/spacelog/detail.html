<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ picture.title }} | SpaceLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0d17; color: white; }
        .img-main { 
            max-height: 80vh; 
            object-fit: contain; 
            border-radius: 15px; 
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-top: -50px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <a href="{% url 'apod_list' %}" class="btn btn-outline-light mb-4">← Voltar ao Diário</a>
        
        <div class="text-center mb-5">
            {% if picture.media_type == "image" %}
                <img src="{{ picture.url }}" alt="{{ picture.title }}" class="img-fluid img-main">
            {% else %}
                <div class="ratio ratio-16x9">
                    <iframe src="{{ picture.url }}" allowfullscreen></iframe>
                </div>
            {% endif %}
        </div>

        <div class="glass-card">
            <h1 class="display-4">{{ picture.title }}</h1>
            <p class="text-info">{{ picture.date|date:"d \d\e F \d\e Y" }}</p>
            <hr class="border-secondary">
            <p class="lead" style="text-align: justify; line-height: 1.8;">
                {{ picture.explanation|linebreaks }}
            </p>
        </div>
    </div>
</body>
</html>
